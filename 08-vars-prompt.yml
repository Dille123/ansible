---
- name: varables from prompt
  hosts: local
  connection: local
  vars_prompt:
  - name: USERNAME
    prompt: please inter your USERNAME
    private: false

  - name: PASSWORD
    prompt: please onter your Password 
    private: false
  
  tasks:
  - name: print user information
    ansible.builtin.debug:
      msg: "hello username is: {{ USERNAME }}, password is {{ PASSWORD }}"

  - name: print user information again
    ansible.builtin.debug:
      msg: "hello user name is {{ USERNAME }}, password is {{ PASSWORD }}"
    no_log: true